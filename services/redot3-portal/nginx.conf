server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index /portal/index.html;

    location /portal/ {
        try_files $uri $uri/ /portal/index.html;
    }

    location = /health {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
