<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — ABC-IO</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#0a0a2e;color:#e2e8f0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 20px}
.card{background:#0f1633;border:1px solid #1e293b;border-radius:16px;padding:40px;width:100%;max-width:480px}
.logo{text-align:center;font-size:22px;font-weight:700;color:#fff;margin-bottom:8px}
.logo span{color:#00ff88}
.subtitle{text-align:center;color:#64748b;font-size:14px;margin-bottom:28px}
.contact-item{display:flex;align-items:center;gap:12px;padding:14px 0;border-bottom:1px solid #1e293b}
.contact-item:last-child{border-bottom:none}
.contact-item .icon{width:36px;height:36px;background:rgba(0,255,136,.1);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
.contact-item h4{font-size:14px;font-weight:600;color:#fff;margin-bottom:2px}
.contact-item p{font-size:13px;color:#94a3b8}
.contact-item a{color:#00ff88;font-size:13px}
.back{text-align:center;margin-top:20px}
.back a{color:#64748b;font-size:13px}
</style>
</head>
<body>
<div class="card">
  <div class="logo">ABC<span>-IO</span></div>
  <p class="subtitle">Get in touch with our team</p>
  <div class="contact-item">
    <div class="icon">✉️</div>
    <div>
      <h4>General Support</h4>
      <p><a href="mailto:support@abc-io.com">support@abc-io.com</a></p>
    </div>
  </div>
  <div class="contact-item">
    <div class="icon">⚖️</div>
    <div>
      <h4>Legal & Privacy</h4>
      <p><a href="mailto:legal@abc-io.com">legal@abc-io.com</a></p>
    </div>
  </div>
  <div class="contact-item">
    <div class="icon">💼</div>
    <div>
      <h4>Enterprise Sales</h4>
      <p><a href="mailto:sales@abc-io.com">sales@abc-io.com</a></p>
    </div>
  </div>
  <div class="contact-item">
    <div class="icon">🐙</div>
    <div>
      <h4>GitHub</h4>
      <p><a href="https://github.com/ccplexmath/redot2complete" target="_blank">github.com/ccplexmath/redot2complete</a></p>
    </div>
  </div>
  <div class="back"><a href="/">← Back to home</a></div>
</div>
</body>
</html>
