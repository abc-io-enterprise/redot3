<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — ABC-IO</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#0a0a2e;color:#e2e8f0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 20px}
.card{background:#0f1633;border:1px solid #1e293b;border-radius:16px;padding:40px;width:100%;max-width:420px}
.logo{text-align:center;font-size:22px;font-weight:700;color:#fff;margin-bottom:8px}
.logo span{color:#00ff88}
.subtitle{text-align:center;color:#64748b;font-size:14px;margin-bottom:28px}
.form-group{margin-bottom:16px}
label{display:block;font-size:13px;font-weight:500;color:#94a3b8;margin-bottom:6px}
input{width:100%;padding:10px 14px;background:#0a0a2e;border:1px solid #334155;border-radius:8px;color:#fff;font-size:14px;outline:none;transition:.2s}
input:focus{border-color:#00ff88}
.btn{width:100%;padding:12px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;border:none;transition:.2s;margin-top:8px}
.btn-primary{background:#00ff88;color:#0a0a2e}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.link{text-align:center;margin-top:16px;font-size:13px;color:#64748b}
.link a{color:#00ff88}
.msg{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:12px;display:none}
.msg.error{background:#fef2f2;border:1px solid #fca5a5;color:#dc2626}
.msg.success{background:#f0fdf4;border:1px solid #86efac;color:#16a34a}
</style>
</head>
<body>
<div class="card">
  <div class="logo">ABC<span>-IO</span></div>
  <p class="subtitle">Reset your password</p>
  <div class="msg" id="msg"></div>
  <form id="form">
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="you@example.com" required>
    </div>
    <button type="submit" class="btn btn-primary" id="btn">Send Reset Link</button>
  </form>
  <p class="link"><a href="/login">← Back to login</a></p>
</div>
<script>
const API = '/api';
document.getElementById('form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('btn');
  const msg = document.getElementById('msg');
  btn.disabled = true; btn.textContent = 'Sending...';
  msg.style.display = 'none';
  try {
    const res = await fetch(`${API}/v1/auth/forgot-password`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: document.getElementById('email').value })
    });
    const data = await res.json();
    msg.className = 'msg success';
    msg.textContent = data.message || 'If that email exists, a reset link has been sent.';
    msg.style.display = 'block';
  } catch (e) {
    msg.className = 'msg error';
    msg.textContent = 'Network error. Please try again.';
    msg.style.display = 'block';
  }
  btn.disabled = false; btn.textContent = 'Send Reset Link';
});
</script>
</body>
</html>
