<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ABC-IO Public Portal</title>
  <style>body{font-family:Arial,sans-serif;max-width:900px;margin:2rem auto;padding:1rem;background:#f5f7fb;color:#111}h1{margin-bottom:.5rem}button{padding:.75rem 1rem;border:none;border-radius:8px;background:#0069d9;color:#fff;cursor:pointer}pre{background:#eef2f7;padding:1rem;border-radius:8px;overflow:auto}</style>
</head>
<body>
  <h1>ABC-IO Public Portal</h1>
  <p>This portal is the public-facing site for the ABC-IO system, including privacy signature validation for verified public hosting.</p>
  <button onclick="loadSignature()">Load Public Signature</button>
  <pre id="signature">No signature loaded.</pre>
  <script>
    async function loadSignature() {
      const res = await fetch('/api/signature');
      const data = await res.json();
      document.getElementById('signature').textContent = JSON.stringify(data, null, 2);
    }
  </script>
</body>
</html>
