<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — ABC-IO</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#0a0a2e;color:#e2e8f0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 20px}
.card{background:#0f1633;border:1px solid #1e293b;border-radius:16px;padding:40px;width:100%;max-width:420px}
.logo{text-align:center;font-size:22px;font-weight:700;color:#fff;margin-bottom:8px}
.logo span{color:#00ff88}
.subtitle{text-align:center;color:#64748b;font-size:14px;margin-bottom:28px}
.form-group{margin-bottom:16px}
label{display:block;font-size:13px;font-weight:500;color:#94a3b8;margin-bottom:6px}
input{width:100%;padding:10px 14px;background:#0a0a2e;border:1px solid #334155;border-radius:8px;color:#fff;font-size:14px;outline:none;transition:.2s}
input:focus{border-color:#00ff88}
input::placeholder{color:#475569}
.btn{width:100%;padding:12px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;border:none;transition:.2s;margin-top:8px}
.btn-primary{background:#00ff88;color:#0a0a2e}
.btn-primary:hover{background:#00dd77}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.link{text-align:center;margin-top:16px;font-size:13px;color:#64748b}
.link a{color:#00ff88}
.msg{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:12px;display:none}
.msg.error{background:#fef2f2;border:1px solid #fca5a5;color:#dc2626}
.msg.success{background:#f0fdf4;border:1px solid #86efac;color:#16a34a}
</style>
</head>
<body>
<div class="card">
  <div class="logo">ABC<span>-IO</span></div>
  <p class="subtitle">Create a new password</p>
  <div class="msg" id="msg"></div>
  <form id="form">
    <div class="form-group">
      <label>New Password</label>
      <input type="password" id="password" placeholder="Min 8 characters" required minlength="8">
    </div>
    <div class="form-group">
      <label>Confirm Password</label>
      <input type="password" id="confirm" placeholder="Repeat password" required minlength="8">
    </div>
    <button type="submit" class="btn btn-primary" id="btn">Reset Password</button>
  </form>
  <p class="link"><a href="/login">← Back to login</a></p>
</div>
<script>
const API='/api';
const params=new URLSearchParams(location.search);
const token=params.get('token');

if(!token){
  document.getElementById('form').style.display='none';
  const msg=document.getElementById('msg');
  msg.className='msg error'; msg.textContent='Invalid or missing reset token.'; msg.style.display='block';
}

document.getElementById('form').addEventListener('submit',async(e)=>{
  e.preventDefault();
  const btn=document.getElementById('btn');
  const msg=document.getElementById('msg');
  const pw=document.getElementById('password').value;
  const cf=document.getElementById('confirm').value;

  if(pw!==cf){
    msg.className='msg error'; msg.textContent='Passwords do not match.'; msg.style.display='block'; return;
  }
  if(pw.length<8){
    msg.className='msg error'; msg.textContent='Password must be at least 8 characters.'; msg.style.display='block'; return;
  }

  btn.disabled=true; btn.textContent='Resetting...';
  msg.style.display='none';
  try{
    const res=await fetch(`${API}/v1/auth/reset-password`,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({token,password:pw})
    });
    const data=await res.json();
    if(res.ok){
      msg.className='msg success';
      msg.textContent=data.message||'Password reset successfully. Redirecting...';
      msg.style.display='block';
      document.getElementById('form').style.display='none';
      setTimeout(()=>location.href='/login',2000);
    }else{
      msg.className='msg error';
      msg.textContent=data.error||'Reset failed. The link may be expired.';
      msg.style.display='block';
    }
  }catch(e){
    msg.className='msg error'; msg.textContent='Network error. Please try again.'; msg.style.display='block';
  }
  btn.disabled=false; btn.textContent='Reset Password';
});
</script>
<div id="cookieBanner" style="display:none;position:fixed;bottom:0;left:0;right:0;background:#0f1633;border-top:1px solid #1e293b;padding:16px 24px;z-index:1000">
  <div style="max-width:1200px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap">
    <span style="font-size:13px;color:#94a3b8">We use cookies to improve your experience. By continuing, you agree to our use of cookies.</span>
    <button onclick="acceptCookies()" style="padding:8px 16px;border-radius:6px;background:#00ff88;color:#0a0a2e;font-size:13px;font-weight:600;border:none;cursor:pointer;white-space:nowrap">Accept</button>
  </div>
</div>
<script>
function acceptCookies(){localStorage.setItem('abcio_cookie_consent','1');document.getElementById('cookieBanner').style.display='none';}
if(!localStorage.getItem('abcio_cookie_consent')){var el=document.getElementById('cookieBanner');if(el)el.style.display='block';}
</script>
</body>
</html>
