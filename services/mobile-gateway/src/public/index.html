<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ABC-IO Mobile Gateway</title>
  <link rel="manifest" href="/manifest.json" />
  <style>body { font-family: Arial, sans-serif; max-width: 720px; margin: 1rem auto; padding: 1rem; background:#f9fafb;color:#111; } h1 { margin-bottom:0.5rem; } .card { background:#fff;padding:1rem;border-radius:12px;box-shadow:0 0 15px rgba(0,0,0,0.08);margin-bottom:1rem; } button { margin-top:1rem; padding:0.75rem 1rem; background:#0d6efd;color:#fff;border:none;border-radius:8px;cursor:pointer; } pre { background:#eef2f7;padding:1rem;border-radius:10px; }</style>
</head>
<body>
  <h1>ABC-IO Mobile Backup Gateway</h1>
  <div class="card">
    <p>Emergency mobile backend for owner and public satellite use.</p>
    <button onclick="fetchStats()">Load System Stats</button>
    <pre id="stats">No stats loaded.</pre>
  </div>
  <div class="card">
    <button onclick="loadSignature()">Load Mobile Gateway Signature</button>
    <pre id="signature">No signature loaded.</pre>
  </div>
  <div class="card">
    <h2>Property Beacon</h2>
    <p>Send a sample beacon event to the mobile gateway.</p>
    <button onclick="sendBeacon()">Send Beacon</button>
    <pre id="beacon">No beacon sent.</pre>
  </div>
  <script>
    async function fetchStats() {
      const res = await fetch('/api/stats');
      const data = await res.json();
      document.getElementById('stats').textContent = JSON.stringify(data, null, 2);
    }
    async function loadSignature() {
      const res = await fetch('/api/signature');
      const data = await res.json();
      document.getElementById('signature').textContent = JSON.stringify(data, null, 2);
    }
    async function sendBeacon() {
      const res = await fetch('/api/beacon', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ deviceId: 'OWN-DEVICE-1', latitude: 40.0, longitude: -74.0, battery: 91 })
      });
      const data = await res.json();
      document.getElementById('beacon').textContent = JSON.stringify(data, null, 2);
    }
  </script>
</body>
</html>
