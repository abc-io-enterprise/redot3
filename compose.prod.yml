services:
  nginx:
    image: nginx:stable-alpine
    ports:
      - '80:80'
      - '443:443'
    depends_on:
      - gateway
    environment:
      - NGINX_ENV=production
    volumes:
      - ./config/nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'
    deploy:
      resources:
        limits:
          memory: 128M

  gateway:
    build:
      context: ./services/gateway
    ports:
      - '4000:4000'
    environment:
      - NODE_ENV=production
      - PORT=4000
      - DATABASE_URL=postgres://postgres:${POSTGRES_PASSWORD}@postgres:5432/abc_io
    depends_on:
      postgres:
        condition: service_healthy
      kimi:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'
    deploy:
      resources:
        limits:
          memory: 256M

  operator-station:
    build:
      context: ./services/operator-station
    environment:
      - NODE_ENV=production
    ports:
      - '8080:8080'
    depends_on:
      gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'
    deploy:
      resources:
        limits:
          memory: 256M

  owner-dashboard:
    build:
      context: ./services/owner-dashboard
    environment:
      - NODE_ENV=production
      - OWNER_SIGNING_KEY=${OWNER_SIGNING_KEY}
      - OWNER_SIGNING_FINGERPRINT=${OWNER_SIGNING_FINGERPRINT}
      - OWNER_ACCOUNT_EMAIL=${OWNER_ACCOUNT_EMAIL}
      - OWNER_ACCOUNT_PASSWORD=${OWNER_ACCOUNT_PASSWORD}
      - OWNER_SESSION_TOKEN=${OWNER_SESSION_TOKEN}
      - OWNER_BIOMETRIC_SECRET=${OWNER_BIOMETRIC_SECRET:-}
      - MOBILE_GATEWAY_URL=http://mobile-gateway:5050
      - APK_PATH=/apk/redot2-latest.apk
    ports:
      - '8500:8500'
    volumes:
      - ./apk:/apk:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'
    depends_on:
      gateway:
        condition: service_healthy
      mobile-gateway:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8500/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M

  mobile-gateway:
    build:
      context: ./services/mobile-gateway
    environment:
      - NODE_ENV=production
      - MOBILE_SIGNING_KEY=${MOBILE_SIGNING_KEY}
      - MOBILE_SIGNING_FINGERPRINT=${MOBILE_SIGNING_FINGERPRINT}
    ports:
      - '5050:5050'
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5050/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'
    deploy:
      resources:
        limits:
          memory: 256M

  public-portal:
    build:
      context: ./services/public-portal
    environment:
      - NODE_ENV=production
      - PUBLIC_SIGNING_KEY=${PUBLIC_SIGNING_KEY}
      - PUBLIC_SIGNING_FINGERPRINT=${PUBLIC_SIGNING_FINGERPRINT}
    ports:
      - '8090:8090'
    depends_on:
      gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8090/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'
    deploy:
      resources:
        limits:
          memory: 256M

  beacon-pwa:
    build:
      context: ./services/beacon-pwa
    ports:
      - '3005:3000'
    restart: unless-stopped
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'
    environment:
      - NODE_ENV=production
    deploy:
      resources:
        limits:
          memory: 256M

  kimi:
    build:
      context: ./services/kimi
    ports:
      - '5000:5000'
    environment:
      - AI_PROVIDER=${AI_PROVIDER:-mistral}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY}
      - MISTRAL_MODEL=${MISTRAL_MODEL}
      - MISTRAL_API_BASE_URL=${MISTRAL_API_BASE_URL}
      - KIMI_API_KEY=${KIMI_API_KEY}
      - KIMI_MODEL=${KIMI_MODEL}
      - KIMI_API_BASE_URL=${KIMI_API_BASE_URL}
    restart: unless-stopped
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'
    deploy:
      resources:
        limits:
          memory: 512M

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: abc_io
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./services/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d abc_io"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'
    deploy:
      resources:
        limits:
          memory: 512M

  prometheus:
    image: prom/prometheus:latest
    ports:
      - '9091:9090'
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    restart: unless-stopped
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'
    deploy:
      resources:
        limits:
          memory: 512M

  grafana:
    image: grafana/grafana:latest
    ports:
      - '14000:3000'
    restart: unless-stopped
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'
    deploy:
      resources:
        limits:
          memory: 256M

  redis:
    image: redis:alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'
    deploy:
      resources:
        limits:
          memory: 128M

  worker:
    build:
      context: ./services/worker
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
    depends_on:
      - redis
    restart: unless-stopped
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'
    deploy:
      resources:
        limits:
          memory: 512M

  logger:
    image: busybox
    command: sh -c 'while true; do sleep 3600; done'
    restart: unless-stopped
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'
    deploy:
      resources:
        limits:
          memory: 64M

  tracer:
    image: jaegertracing/all-in-one:latest
    ports:
      - '16686:16686'
      - '6831:6831/udp'
    restart: unless-stopped
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'
    deploy:
      resources:
        limits:
          memory: 512M

  headscale:
    image: headscale/headscale:latest
    container_name: redot2-headscale
    ports:
      - '8085:8080'
      - '9095:9090'
      - '41641:41641/udp'
    volumes:
      - ./config/headscale:/etc/headscale:ro
      - headscale-data:/var/lib/headscale
    command: serve
    restart: unless-stopped
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'
    deploy:
      resources:
        limits:
          memory: 256M

  ai-isp:
    build:
      context: ./services/ai-isp
    ports:
      - '7000:7000'
    environment:
      - PORT=7000
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'
    deploy:
      resources:
        limits:
          memory: 512M

  beacon:
    build:
      context: ./services/beacon
    ports:
      - '3006:3000'
    environment:
      - NODE_ENV=production
      - PORT=3000
    restart: unless-stopped
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  postgres-data:
  headscale-data:
