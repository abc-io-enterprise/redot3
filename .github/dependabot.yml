version: 2
updates:
  # Node.js services
  - package-ecosystem: "npm"
    directory: "/services/gateway"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 5
    reviewers:
      - "abc-io-enterprise/backend"
      - "abc-io-enterprise/security"
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: "npm"
    directory: "/services/operator-station"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 5
    reviewers:
      - "abc-io-enterprise/backend"
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: "npm"
    directory: "/services/owner-dashboard"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 5
    reviewers:
      - "abc-io-enterprise/platform-maintainers"
      - "abc-io-enterprise/security"
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: "npm"
    directory: "/services/mobile-gateway"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 5
    reviewers:
      - "abc-io-enterprise/mobile"
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: "npm"
    directory: "/services/public-portal"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 5
    reviewers:
      - "abc-io-enterprise/frontend"
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: "npm"
    directory: "/services/beacon-pwa"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 3
    reviewers:
      - "abc-io-enterprise/mobile"
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: "npm"
    directory: "/services/beacon"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 3
    reviewers:
      - "abc-io-enterprise/mobile"
    commit-message:
      prefix: "chore(deps)"

  # Root package.json / workspace metadata
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 3
    reviewers:
      - "abc-io-enterprise/platform-maintainers"
    commit-message:
      prefix: "chore(deps)"

  # Python services
  - package-ecosystem: "pip"
    directory: "/services/kimi"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 5
    reviewers:
      - "abc-io-enterprise/ai"
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: "pip"
    directory: "/services/worker"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 5
    reviewers:
      - "abc-io-enterprise/ai"
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: "pip"
    directory: "/services/ai-isp"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 5
    reviewers:
      - "abc-io-enterprise/ai"
    commit-message:
      prefix: "chore(deps)"

  # Docker base images
  - package-ecosystem: "docker"
    directory: "/services/gateway"
    schedule:
      interval: "weekly"
    reviewers:
      - "abc-io-enterprise/sre"

  - package-ecosystem: "docker"
    directory: "/services/kimi"
    schedule:
      interval: "weekly"
    reviewers:
      - "abc-io-enterprise/sre"

  - package-ecosystem: "docker"
    directory: "/services/ai-isp"
    schedule:
      interval: "weekly"
    reviewers:
      - "abc-io-enterprise/sre"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 5
    reviewers:
      - "abc-io-enterprise/sre"
      - "abc-io-enterprise/security"
    commit-message:
      prefix: "chore(ci)"
