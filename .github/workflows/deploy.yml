name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      tag:
        description: 'Release tag to deploy'
        required: true
        default: 'v1.0.0'

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy ${{ github.event.inputs.tag }} to ${{ github.event.inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    steps:
      - name: Checkout repository at tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag }}
          fetch-depth: 0

      - name: Verify tag signature (optional)
        run: |
          git verify-tag ${{ github.event.inputs.tag }} || echo "ℹ️ Tag is not GPG-signed."

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script_stop: true
          script: |
            set -euo pipefail
            cd /opt/redot2
            git fetch --all --tags
            git checkout ${{ github.event.inputs.tag }}
            # Write production env safely (file permissions restricted)
            cat > .env <<'ENV_EOF'
            ${{ secrets.PROD_ENV_FILE }}
            ENV_EOF
            chmod 600 .env
            # Pull latest images and recreate services
            docker compose -f compose.prod.yml pull
            docker compose -f compose.prod.yml up -d --remove-orphans
            # Health verification
            ./scripts/health-check.sh

      - name: Smoke test
        run: |
          echo "Waiting for services to stabilize..."
          sleep 30
          curl -fsS --retry 5 --retry-delay 10 "http://${{ secrets.VPS_HOST }}/health" || {
            echo "❌ Smoke test failed. Initiating rollback is recommended."
            exit 1
          }
          echo "✅ Smoke test passed."

      - name: Notify success
        if: success()
        run: echo "✅ Deployment to ${{ github.event.inputs.environment }} succeeded."

      - name: Notify failure
        if: failure()
        run: echo "❌ Deployment to ${{ github.event.inputs.environment }} FAILED — check VPS state and consider rollback."
