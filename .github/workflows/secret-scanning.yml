name: "Secret Scanning"

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  detect-secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install truffleHog
        run: pip install truffleHog3

      - name: Scan for secrets
        run: truffleHog filesystem . --json --regex --entropy=False

      - name: GitHub secret scanning
        run: |
          echo "GitHub secret scanning enabled by default"
          echo "Check: Settings > Security > Secret scanning & push protection"
