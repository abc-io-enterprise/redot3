name: Secret Scanning

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  detect-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install truffleHog3
        run: pip install truffleHog3

      - name: Scan repository history for secrets
        run: |
          # Scan full git history with high-sensitivity regex and entropy rules
          truffleHog3 --json --rules https://raw.githubusercontent.com/feeltheajith/truffleHog3-rules/master/rules.yml . || true
          # Also scan current working tree only
          truffleHog3 --json --rules https://raw.githubusercontent.com/feeltheajith/truffleHog3-rules/master/rules.yml --no-history . || true

      - name: Verify GitHub secret scanning is enabled
        run: |
          echo "Ensure the following are enabled in the repository settings:"
          echo "  Settings > Security > Code security and analysis"
          echo "    - Secret scanning: Enabled"
          echo "    - Push protection: Enabled"
