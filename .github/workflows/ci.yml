name: CI

on:
  push:
    branches: [main, master]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.security/**'
  pull_request:
    branches: [main, master]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.security/**'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build gateway
        run: docker build -t abc-io-gateway ./services/gateway

      - name: Build operator-station
        run: docker build -t abc-io-operator-station ./services/operator-station

      - name: Build owner-dashboard
        run: docker build -t abc-io-owner-dashboard ./services/owner-dashboard

      - name: Build mobile-gateway
        run: docker build -t abc-io-mobile-gateway ./services/mobile-gateway

      - name: Build public-portal
        run: docker build -t abc-io-public-portal ./services/public-portal

      - name: Build beacon-pwa
        run: docker build -t abc-io-beacon-pwa ./services/beacon-pwa

      - name: Build account-pwa
        run: docker build -t abc-io-account-pwa ./services/account-pwa

      - name: Build interface-pwa
        run: docker build -t abc-io-interface-pwa ./services/interface-pwa

      - name: Build beacon
        run: docker build -t abc-io-beacon ./services/beacon

      - name: Build kimi
        run: docker build -t abc-io-kimi ./services/kimi

      - name: Build worker
        run: docker build -t abc-io-worker ./services/worker

      - name: Build ai-isp
        run: docker build -t abc-io-ai-isp ./services/ai-isp

      - name: Validate compose files
        run: |
          docker compose -f docker-compose.yml config
          docker compose -f compose.dev.yml config
          docker compose -f compose.staging.yml config
          docker compose -f compose.prod.yml config
          docker compose -f compose.replica.yml config
          docker compose -f compose.replica-ai1.yml config
          docker compose -f compose.replica-ai2.yml config
