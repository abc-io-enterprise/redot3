name: "Secrets Rotation Reminder"

on:
  schedule:
    - cron: "0 8 1 * *"  # First day of month at 8 AM UTC

jobs:
  rotation-check:
    runs-on: ubuntu-latest
    steps:
      - name: Create rotation reminder issue
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: "🔐 Monthly Secrets Rotation Required",
              body: "This is a reminder to rotate all secrets (OWNER_SIGNING_KEY, POSTGRES_PASSWORD, etc.) this month.\n\n**Checklist:**\n- [ ] Generate new signing keys\n- [ ] Update .env locally\n- [ ] Update GitHub Secrets\n- [ ] Update VPS .env files\n- [ ] Test deployment\n- [ ] Document rotation in audit log",
              labels: ["security", "maintenance"]
            })
