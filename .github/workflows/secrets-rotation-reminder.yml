name: Secrets Rotation Reminder

on:
  schedule:
    - cron: "0 8 1 * *"  # First day of the month at 8 AM UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  rotation-check:
    runs-on: ubuntu-latest
    steps:
      - name: Create rotation reminder issue
        uses: actions/github-script@v7
        with:
          script: |
            const title = "🔐 Monthly Secrets Rotation Required";
            const body = `This is the monthly reminder to review and rotate secrets.

**High-priority rotation targets (90 days max):**
- POSTGRES_PASSWORD
- OWNER_SESSION_TOKEN
- OWNER_ACCOUNT_PASSWORD
- GATEWAY_API_KEY
- SELF_HEAL_TOKEN
- REDOT1_API_KEY
- SMTP_PASS
- GITEA_DB_PASSWORD
- VPS_SSH_KEY (if older than 90 days)

**Medium-priority rotation targets (180 days max):**
- OWNER_SIGNING_KEY
- OWNER_BIOMETRIC_SECRET
- MOBILE_SIGNING_KEY
- PUBLIC_SIGNING_KEY
- JWT_SECRET
- HEADSCALE_API_KEY
- GITEA_SECRET_KEY
- GITEA_INTERNAL_TOKEN

**Checklist:**
- [ ] Generate new values using commands in \`.security/SECRETS_INVENTORY.md\`
- [ ] Update local \`.env\` on the primary VPS and any AI nodes
- [ ] Update GitHub Repository Secrets via \`scripts/set-github-secrets.sh\`
- [ ] Re-run \`docker compose -f compose.prod.yml up -d --force-recreate\` for affected services
- [ ] Verify with \`./scripts/health-check.sh\` and \`./scripts/auto-heal.sh\`
- [ ] Record rotation in \`.security/SECRETS_ROTATION_LOG.md\`
- [ ] Revoke old vendor tokens (Stripe, Mistral, Kimi, SMTP) if rotated

/label ~security ~maintenance
/milestone %"Operational Excellence"`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ["security", "maintenance"]
            });
