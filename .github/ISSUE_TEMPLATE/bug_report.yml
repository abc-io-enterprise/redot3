name: Bug Report
description: File a bug report
labels: ["bug", "triage"]
assignees:
  - abc-io-enterprise/platform-maintainers
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: dropdown
    id: service
    attributes:
      label: Affected service
      options:
        - gateway
        - operator-station
        - owner-dashboard
        - mobile-gateway
        - public-portal
        - beacon
        - beacon-pwa
        - kimi
        - worker
        - ai-isp
        - infrastructure / deployment
        - documentation
        - other
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Provide the exact steps, curl commands, or configuration snippets needed to reproduce the issue.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Docker version, host OS, commit SHA, and whether the issue occurs in local dev, staging, or production.
    validations:
      required: false
  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      description: By submitting this issue, you agree to follow our [Code of Conduct](../../CODE_OF_CONDUCT.md)
      options:
        - label: I agree to follow this project's Code of Conduct
          required: true
