client_max_body_size 10M;

# NGINX health check
location /health {
  access_log off;
  return 200 '{"status":"ok","service":"nginx"}';
  add_header Content-Type application/json;
}

# Public Portal signature (must be before /api/ gateway catch-all)
location /api/signature {
  proxy_pass http://public_portal;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
}

# Mobile Gateway beacon (must be before /api/ gateway catch-all)
location /api/beacon {
  proxy_pass http://mobile_gateway;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
}

# Public Portal help articles (must be before /api/ gateway catch-all)
location /api/v1/help/ {
  proxy_pass http://public_portal;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
}

# API routes → Gateway
location /api/ {
  limit_req zone=api burst=20 nodelay;
  proxy_pass http://gateway;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_connect_timeout 30s;
  proxy_send_timeout 30s;
  proxy_read_timeout 30s;
}

# Beacon PWA served under /beacon path (HTTPS)
location = /beacon {
  return 301 /beacon/;
}
location /beacon/ {
  proxy_pass http://beacon_pwa/;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
}

# Account PWA served under /account path
location = /account {
  return 301 /account/;
}
location /account/ {
  proxy_pass http://account_pwa/;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
}

# Interface PWA served under /interface path
location = /interface {
  return 301 /interface/;
}
location /interface/ {
  proxy_pass http://interface_pwa/;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
}

# Prometheus metrics → Gateway
location /metrics {
  proxy_pass http://gateway;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
}

# Extensionless public-portal page rewrites (e.g. /login → /login.html)
rewrite ^/login$ /login.html last;
rewrite ^/signup$ /signup.html last;
rewrite ^/dashboard$ /dashboard.html last;
rewrite ^/contact$ /contact.html last;
rewrite ^/forgot-password$ /forgot-password.html last;
rewrite ^/reset-password$ /reset-password.html last;
rewrite ^/verify-email$ /verify-email.html last;

# Static files → Public Portal
location / {
  proxy_pass http://public_portal;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
}
