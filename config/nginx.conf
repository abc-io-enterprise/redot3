events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for"';

  access_log /var/log/nginx/access.log main;

  # Rate limit zones
  limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
  limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

  # Upstreams — triple-node redundant backends
  # Local compose service names resolve when running the full stack on the same host;
  # static IPs ensure cross-node failover on replica nodes.
  upstream gateway {
    server gateway:4000 max_fails=2 fail_timeout=10s;
    server 162.254.32.142:4000 max_fails=2 fail_timeout=10s;
    server 192.227.212.235:4000 max_fails=2 fail_timeout=10s;
    server 192.227.212.237:4000 max_fails=2 fail_timeout=10s backup;
  }

  upstream public_portal {
    server public-portal:8090 max_fails=2 fail_timeout=10s;
    server 162.254.32.142:8090 max_fails=2 fail_timeout=10s;
    server 192.227.212.235:8090 max_fails=2 fail_timeout=10s;
    server 192.227.212.237:8090 max_fails=2 fail_timeout=10s backup;
  }

  upstream owner_dashboard {
    server owner-dashboard:8500 max_fails=2 fail_timeout=10s;
    server 162.254.32.142:8500 max_fails=2 fail_timeout=10s;
  }

  upstream mobile_gateway {
    server mobile-gateway:5050 max_fails=2 fail_timeout=10s;
    server 162.254.32.142:5050 max_fails=2 fail_timeout=10s;
    server 192.227.212.235:5050 max_fails=2 fail_timeout=10s;
    server 192.227.212.237:5050 max_fails=2 fail_timeout=10s backup;
  }

  upstream beacon_pwa {
    server beacon-pwa:3000 max_fails=2 fail_timeout=10s;
    server 162.254.32.142:3005 max_fails=2 fail_timeout=10s;
    server 192.227.212.235:3005 max_fails=2 fail_timeout=10s;
    server 192.227.212.237:3005 max_fails=2 fail_timeout=10s backup;
  }

  upstream account_pwa {
    server account-pwa:3000 max_fails=2 fail_timeout=10s;
    server 162.254.32.142:8100 max_fails=2 fail_timeout=10s;
    server 192.227.212.235:8100 max_fails=2 fail_timeout=10s;
    server 192.227.212.237:8100 max_fails=2 fail_timeout=10s backup;
  }

  # ============================================
  # HTTP server — serves traffic directly (external proxy handles HTTPS termination)
  # ============================================
  server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name abc-io.com www.abc-io.com;

    # Certbot challenge path (must stay on HTTP)
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    include /etc/nginx/conf.d/locations.conf;
  }

  # ============================================
  # HTTPS (SSL) — activate after certbot setup
  # ============================================
  server {
    listen 443 ssl http2 default_server;
    listen [::]:443 ssl http2 default_server;
    server_name abc-io.com www.abc-io.com;

    ssl_certificate /etc/letsencrypt/live/abc-io.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/abc-io.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # HSTS is handled by upstream Node.js services via Helmet

    include /etc/nginx/conf.d/locations.conf;
  }
}
