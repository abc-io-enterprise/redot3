events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for"';

  access_log /var/log/nginx/access.log main;

  # Rate limit zones
  limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
  limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

  # Upstreams
  upstream gateway {
    server gateway:4000;
  }

  upstream public_portal {
    server public-portal:8090;
  }

  upstream owner_dashboard {
    server owner-dashboard:8500;
  }

  upstream mobile_gateway {
    server mobile-gateway:5050;
  }

  upstream beacon_pwa {
    server beacon-pwa:3000;
  }

  # ============================================
  # HTTP → HTTPS redirect (SSL ready — uncomment after certbot)
  # ============================================
  server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name abc-io.com www.abc-io.com;

    # Certbot challenge path (must stay on HTTP)
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    # Internal health check (no redirect)
    location /health {
      access_log off;
      return 200 '{"status":"ok","service":"nginx"}';
      add_header Content-Type application/json;
    }

    # Redirect all HTTP traffic to HTTPS
    location / {
      return 301 https://$server_name$request_uri;
    }
  }

  # ============================================
  # HTTPS (SSL) — activate after certbot setup
  # ============================================
  server {
    listen 443 ssl http2 default_server;
    listen [::]:443 ssl http2 default_server;
    server_name abc-io.com www.abc-io.com;

    ssl_certificate /etc/letsencrypt/live/abc-io.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/abc-io.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # HSTS is handled by upstream Node.js services via Helmet

    include /etc/nginx/conf.d/locations.conf;
  }
}
