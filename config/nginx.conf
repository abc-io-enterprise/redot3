events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for"';

  access_log /var/log/nginx/access.log main;

  # Rate limit zones
  limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
  limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

  # Upstreams
  upstream gateway {
    server gateway:4000;
  }

  upstream public_portal {
    server public-portal:8090;
  }

  upstream owner_dashboard {
    server owner-dashboard:8500;
  }

  # ============================================
  # HTTP → HTTPS redirect (when SSL is ready)
  # ============================================
  # server {
  #   listen 80;
  #   server_name abc-io.com www.abc-io.com;
  #   return 301 https://$server_name$request_uri;
  # }

  # ============================================
  # Main server (HTTP for now — SSL below)
  # ============================================
  server {
    listen 80;
    server_name abc-io.com www.abc-io.com _;

    client_max_body_size 10M;

    # API routes → Gateway
    location /api/ {
      limit_req zone=api burst=20 nodelay;
      proxy_pass http://gateway;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_connect_timeout 30s;
      proxy_send_timeout 30s;
      proxy_read_timeout 30s;
    }

    # Owner dashboard → separate admin interface
    location /admin/ {
      proxy_pass http://owner_dashboard/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static files → Public Portal
    location / {
      proxy_pass http://public_portal;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }

  # ============================================
  # HTTPS (SSL) — Uncomment after certbot setup
  # ============================================
  # server {
  #   listen 443 ssl http2;
  #   server_name abc-io.com www.abc-io.com;
  #
  #   ssl_certificate /etc/letsencrypt/live/abc-io.com/fullchain.pem;
  #   ssl_certificate_key /etc/letsencrypt/live/abc-io.com/privkey.pem;
  #   ssl_protocols TLSv1.2 TLSv1.3;
  #   ssl_ciphers HIGH:!aNULL:!MD5;
  #   ssl_prefer_server_ciphers on;
  #
  #   include /etc/nginx/conf.d/locations.conf;
  # }
}
