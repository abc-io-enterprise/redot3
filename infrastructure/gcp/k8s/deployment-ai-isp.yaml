apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-isp
  namespace: abc-io
  labels:
    app: ai-isp
    tier: ai
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: ai-isp
  template:
    metadata:
      labels:
        app: ai-isp
        tier: ai
    spec:
      containers:
        - name: ai-isp
          image: gcr.io/abc-io-project/ai-isp:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 7000
              name: http
          env:
            - name: PORT
              value: "7000"
            - name: PYTHONUNBUFFERED
              value: "1"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 7000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 7000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: ai-isp
  namespace: abc-io
  labels:
    app: ai-isp
spec:
  type: ClusterIP
  selector:
    app: ai-isp
  ports:
    - port: 7000
      targetPort: 7000
      protocol: TCP
      name: http
