apiVersion: apps/v1
kind: Deployment
metadata:
  name: operator-station
  namespace: abc-io
  labels:
    app: operator-station
    tier: monitoring
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: operator-station
  template:
    metadata:
      labels:
        app: operator-station
        tier: monitoring
    spec:
      containers:
        - name: operator-station
          image: gcr.io/abc-io-project/operator-station:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: PORT
              value: "8080"
            - name: NODE_ENV
              value: "production"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: operator-station
  namespace: abc-io
  labels:
    app: operator-station
spec:
  type: ClusterIP
  selector:
    app: operator-station
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: http
