apiVersion: v1
kind: ConfigMap
metadata:
  name: abc-io-config
  namespace: abc-io
data:
  ENVIRONMENT: "production"
  LOG_LEVEL: "info"
  GATEWAY_PORT: "8080"
  GATEWAY_HOST: "0.0.0.0"
  OWNER_DASHBOARD_PORT: "8500"
  OWNER_DASHBOARD_HOST: "0.0.0.0"
  KIMI_PORT: "8600"
  KIMI_HOST: "0.0.0.0"
  DB_NAME: "abc_io_db"
  DB_SSL_MODE: "require"
  REDIS_DB: "0"
  REDIS_SSL: "true"
  STORAGE_BUCKET_PATH: "gs://abc-io-artifacts"
