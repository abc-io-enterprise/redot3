apiVersion: apps/v1
kind: Deployment
metadata:
  name: beacon-pwa
  namespace: abc-io
  labels:
    app: beacon-pwa
    tier: frontend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: beacon-pwa
  template:
    metadata:
      labels:
        app: beacon-pwa
        tier: frontend
    spec:
      containers:
        - name: beacon-pwa
          image: gcr.io/abc-io-project/beacon-pwa:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3005
              name: http
          env:
            - name: PORT
              value: "3005"
            - name: NODE_ENV
              value: "production"
            - name: BEACON_PORT
              value: "3006"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3005
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 3005
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: beacon-pwa
  namespace: abc-io
  labels:
    app: beacon-pwa
spec:
  type: ClusterIP
  selector:
    app: beacon-pwa
  ports:
    - port: 3005
      targetPort: 3005
      protocol: TCP
      name: http
