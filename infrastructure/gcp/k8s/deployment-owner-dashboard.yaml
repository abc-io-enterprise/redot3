apiVersion: apps/v1
kind: Deployment
metadata:
  name: owner-dashboard
  namespace: abc-io
  labels:
    app: owner-dashboard
    tier: admin
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: owner-dashboard
  template:
    metadata:
      labels:
        app: owner-dashboard
        tier: admin
    spec:
      containers:
        - name: owner-dashboard
          image: gcr.io/abc-io-project/owner-dashboard:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8500
              name: http
          env:
            - name: PORT
              value: "8500"
            - name: NODE_ENV
              value: "production"
            - name: OWNER_SIGNING_KEY
              valueFrom:
                secretKeyRef:
                  name: abc-io-secrets
                  key: owner_signing_key
            - name: OWNER_SIGNING_FINGERPRINT
              valueFrom:
                secretKeyRef:
                  name: abc-io-secrets
                  key: owner_signing_fingerprint
            - name: OWNER_ACCOUNT_EMAIL
              valueFrom:
                secretKeyRef:
                  name: abc-io-secrets
                  key: owner_account_email
            - name: OWNER_ACCOUNT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: abc-io-secrets
                  key: owner_account_password
            - name: OWNER_SESSION_TOKEN
              valueFrom:
                secretKeyRef:
                  name: abc-io-secrets
                  key: owner_session_token
            - name: OWNER_BIOMETRIC_SECRET
              valueFrom:
                secretKeyRef:
                  name: abc-io-secrets
                  key: owner_biometric_secret
            - name: MOBILE_GATEWAY_URL
              value: "http://mobile-gateway:5050"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: abc-io-secrets
                  key: database_url
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8500
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8500
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: owner-dashboard
  namespace: abc-io
  labels:
    app: owner-dashboard
spec:
  type: ClusterIP
  selector:
    app: owner-dashboard
  ports:
    - port: 8500
      targetPort: 8500
      protocol: TCP
      name: http
