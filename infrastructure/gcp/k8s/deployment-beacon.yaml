apiVersion: apps/v1
kind: Deployment
metadata:
  name: beacon
  namespace: abc-io
  labels:
    app: beacon
    tier: backend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: beacon
  template:
    metadata:
      labels:
        app: beacon
        tier: backend
    spec:
      containers:
        - name: beacon
          image: gcr.io/abc-io-project/beacon:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3006
              name: http
          env:
            - name: PORT
              value: "3006"
            - name: NODE_ENV
              value: "production"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: abc-io-secrets
                  key: database_url
            - name: SMTP_URL
              valueFrom:
                secretKeyRef:
                  name: abc-io-secrets
                  key: smtp_url
            - name: SMTP_HOST
              valueFrom:
                secretKeyRef:
                  name: abc-io-secrets
                  key: smtp_host
            - name: SMTP_PORT
              valueFrom:
                secretKeyRef:
                  name: abc-io-secrets
                  key: smtp_port
            - name: SMTP_USER
              valueFrom:
                secretKeyRef:
                  name: abc-io-secrets
                  key: smtp_user
            - name: SMTP_PASS
              valueFrom:
                secretKeyRef:
                  name: abc-io-secrets
                  key: smtp_pass
            - name: SMTP_FROM
              valueFrom:
                secretKeyRef:
                  name: abc-io-secrets
                  key: smtp_from
            - name: OWNER_ACCOUNT_EMAIL
              valueFrom:
                secretKeyRef:
                  name: abc-io-secrets
                  key: owner_account_email
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3006
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 3006
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: beacon
  namespace: abc-io
  labels:
    app: beacon
spec:
  type: ClusterIP
  selector:
    app: beacon
  ports:
    - port: 3006
      targetPort: 3006
      protocol: TCP
      name: http
