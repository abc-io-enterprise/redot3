apiVersion: v1
kind: Secret
metadata:
  name: abc-io-secrets
  namespace: abc-io
type: Opaque
stringData:
  # Database
  db_password: "REPLACE_WITH_DB_PASSWORD"
  db_host: "postgres"
  database_url: "postgres://postgres:REPLACE_WITH_DB_PASSWORD@postgres:5432/abc_io"

  # Redis
  redis_host: "redis"
  redis_password: "REPLACE_WITH_REDIS_PASSWORD"

  # JWT / Auth
  jwt_secret: "REPLACE_WITH_JWT_SECRET"
  api_key: "REPLACE_WITH_API_KEY"
  owner_session_token: "REPLACE_WITH_OWNER_SESSION_TOKEN"

  # Signing keys
  owner_signing_key: "REPLACE_WITH_OWNER_SIGNING_KEY"
  owner_signing_fingerprint: "REPLACE_WITH_OWNER_SIGNING_FINGERPRINT"
  mobile_signing_key: "REPLACE_WITH_MOBILE_SIGNING_KEY"
  mobile_signing_fingerprint: "REPLACE_WITH_MOBILE_SIGNING_FINGERPRINT"
  public_signing_key: "REPLACE_WITH_PUBLIC_SIGNING_KEY"
  public_signing_fingerprint: "REPLACE_WITH_PUBLIC_SIGNING_FINGERPRINT"

  # Owner account
  owner_account_email: "REPLACE_WITH_OWNER_EMAIL"
  owner_account_password: "REPLACE_WITH_OWNER_PASSWORD"
  owner_biometric_secret: "REPLACE_WITH_OWNER_BIOMETRIC_SECRET"

  # Stripe
  stripe_secret_key: "REPLACE_WITH_STRIPE_SECRET_KEY"
  stripe_webhook_secret: "REPLACE_WITH_STRIPE_WEBHOOK_SECRET"
  stripe_price_id_pro: "REPLACE_WITH_STRIPE_PRICE_ID_PRO"
  stripe_price_id_enterprise: "REPLACE_WITH_STRIPE_PRICE_ID_ENTERPRISE"

  # AI Providers
  mistral_api_key: "REPLACE_WITH_MISTRAL_API_KEY"
  mistral_model: "mistral-small-latest"
  mistral_api_base_url: "https://api.mistral.ai/v1"
  kimi_api_key: "REPLACE_WITH_KIMI_API_KEY"
  kimi_model: "kimi-latest"
  kimi_api_base_url: "https://api.kimi.ai/v1"
  ai_provider: "mistral"

  # SMTP
  smtp_url: ""
  smtp_host: ""
  smtp_port: "587"
  smtp_user: ""
  smtp_pass: ""
  smtp_from: ""

  # Grafana
  grafana_admin_password: "REPLACE_WITH_GRAFANA_ADMIN_PASSWORD"
