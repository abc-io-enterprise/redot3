apiVersion: apps/v1
kind: Deployment
metadata:
  name: kimi
  namespace: abc-io
  labels:
    app: kimi
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: kimi
  template:
    metadata:
      labels:
        app: kimi
    spec:
      containers:
        - name: kimi
          image: gcr.io/abc-io-project/kimi:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8600
              name: http
          envFrom:
            - configMapRef:
                name: abc-io-config
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: abc-io-secrets
                  key: db_password
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: abc-io-secrets
                  key: db_host
            - name: REDIS_HOST
              valueFrom:
                secretKeyRef:
                  name: abc-io-secrets
                  key: redis_host
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: abc-io-secrets
                  key: redis_password
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: abc-io-secrets
                  key: api_key
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8600
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /ready
              port: 8600
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: kimi
  namespace: abc-io
  labels:
    app: kimi
spec:
  type: NodePort
  selector:
    app: kimi
  ports:
    - port: 8600
      targetPort: 8600
      protocol: TCP
      name: http
