apiVersion: apps/v1
kind: Deployment
metadata:
  name: kimi
  namespace: abc-io
  labels:
    app: kimi
    tier: ai
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: kimi
  template:
    metadata:
      labels:
        app: kimi
        tier: ai
    spec:
      containers:
        - name: kimi
          image: gcr.io/abc-io-project/kimi:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
              name: http
          env:
            - name: AI_PROVIDER
              valueFrom:
                secretKeyRef:
                  name: abc-io-secrets
                  key: ai_provider
            - name: MISTRAL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: abc-io-secrets
                  key: mistral_api_key
            - name: MISTRAL_MODEL
              valueFrom:
                secretKeyRef:
                  name: abc-io-secrets
                  key: mistral_model
            - name: MISTRAL_API_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: abc-io-secrets
                  key: mistral_api_base_url
            - name: KIMI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: abc-io-secrets
                  key: kimi_api_key
            - name: KIMI_MODEL
              valueFrom:
                secretKeyRef:
                  name: abc-io-secrets
                  key: kimi_model
            - name: KIMI_API_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: abc-io-secrets
                  key: kimi_api_base_url
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: kimi
  namespace: abc-io
  labels:
    app: kimi
spec:
  type: ClusterIP
  selector:
    app: kimi
  ports:
    - port: 5000
      targetPort: 5000
      protocol: TCP
      name: http
