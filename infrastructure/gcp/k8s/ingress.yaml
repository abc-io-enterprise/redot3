apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: abc-io-ingress
  namespace: abc-io
  annotations:
    kubernetes.io/ingress.class: "gce"
    networking.gke.io/managed-certificates: "abc-io-managed-cert"
    networking.gke.io/v1beta1.FrontendConfig: "abc-io-frontend-config"
spec:
  rules:
    - host: abc-io.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nginx
                port:
                  number: 80
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: gateway
                port:
                  number: 4000
          - path: /admin
            pathType: Prefix
            backend:
              service:
                name: owner-dashboard
                port:
                  number: 8500
          - path: /grafana
            pathType: Prefix
            backend:
              service:
                name: grafana
                port:
                  number: 3000
          - path: /prometheus
            pathType: Prefix
            backend:
              service:
                name: prometheus
                port:
                  number: 9090
---
apiVersion: networking.gke.io/v1
kind: ManagedCertificate
metadata:
  name: abc-io-managed-cert
  namespace: abc-io
spec:
  domains:
    - abc-io.com
    - www.abc-io.com
---
apiVersion: networking.gke.io/v1beta1
kind: FrontendConfig
metadata:
  name: abc-io-frontend-config
  namespace: abc-io
spec:
  redirectToHttps:
    enabled: true
