apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: abc-io
  labels:
    app: gateway
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: gcr.io/abc-io-project/gateway:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: abc-io-config
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: abc-io-secrets
                  key: db_password
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: abc-io-secrets
                  key: db_host
            - name: REDIS_HOST
              valueFrom:
                secretKeyRef:
                  name: abc-io-secrets
                  key: redis_host
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: abc-io-secrets
                  key: redis_password
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: abc-io-secrets
                  key: jwt_secret
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: abc-io-secrets
                  key: api_key
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: abc-io
  labels:
    app: gateway
spec:
  type: NodePort
  selector:
    app: gateway
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: http
