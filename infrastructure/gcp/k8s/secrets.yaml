apiVersion: v1
kind: Secret
metadata:
  name: abc-io-secrets
  namespace: abc-io
type: Opaque
stringData:
  # Replace with actual values before applying.
  # Example generation:
  #   kubectl create secret generic abc-io-secrets \
  #     --from-literal=db_password='YOUR_DB_PASSWORD' \
  #     --from-literal=db_host='YOUR_DB_PRIVATE_IP' \
  #     --from-literal=redis_host='YOUR_REDIS_HOST' \
  #     --from-literal=redis_password='YOUR_REDIS_PASSWORD' \
  #     --from-literal=jwt_secret='YOUR_JWT_SECRET' \
  #     --from-literal=api_key='YOUR_API_KEY' \
  #     -n abc-io --dry-run=client -o yaml > secrets.yaml
  db_password: "REPLACE_WITH_DB_PASSWORD"
  db_host: "REPLACE_WITH_DB_PRIVATE_IP"
  redis_host: "REPLACE_WITH_REDIS_HOST"
  redis_password: "REPLACE_WITH_REDIS_PASSWORD"
  jwt_secret: "REPLACE_WITH_JWT_SECRET"
  api_key: "REPLACE_WITH_API_KEY"
