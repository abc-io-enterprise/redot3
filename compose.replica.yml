# ABC-IO v5.0.0 Replica Node Compose
# Runs on ai1/ai2 as redundant public-facing nodes.
# DB and Redis are shared from the primary node (redot1) via REDIS_URL/DATABASE_URL.
services:
  nginx:
    image: nginx:stable-alpine
    ports:
      - '80:80'
      - '443:443'
    depends_on:
      - gateway
      - public-portal
      - beacon-pwa
      - account-pwa
    environment:
      - NGINX_ENV=production
    volumes:
      - ./config/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./config/locations.conf:/etc/nginx/conf.d/locations.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'
    deploy:
      resources:
        limits:
          memory: 128M

  gateway:
    build:
      context: ./services/gateway
    ports:
      - '4000:4000'
    environment:
      - NODE_ENV=production
      - PORT=4000
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - KIMI_ENDPOINTS=${KIMI_ENDPOINTS:-http://kimi:5000,http://192.227.212.235:5000,http://192.227.212.237:5000}
      - JWT_SECRET=${JWT_SECRET}
      - OWNER_SIGNING_KEY=${OWNER_SIGNING_KEY}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - STRIPE_PRICE_ID_FREE=${STRIPE_PRICE_ID_FREE}
      - STRIPE_PRICE_ID_BASIC=${STRIPE_PRICE_ID_BASIC}
      - STRIPE_PRICE_ID_STANDARD=${STRIPE_PRICE_ID_STANDARD}
      - STRIPE_PRICE_ID_PRO=${STRIPE_PRICE_ID_PRO}
      - STRIPE_PRICE_ID_BUSINESS=${STRIPE_PRICE_ID_BUSINESS}
      - STRIPE_PRICE_ID_TEAM=${STRIPE_PRICE_ID_TEAM}
      - STRIPE_PRICE_ID_CORPORATE=${STRIPE_PRICE_ID_CORPORATE}
      - STRIPE_PRICE_ID_ENTERPRISE=${STRIPE_PRICE_ID_ENTERPRISE}
      - STRIPE_PRICE_ID_AGENCY=${STRIPE_PRICE_ID_AGENCY}
      - STRIPE_PRICE_ID_GLOBAL=${STRIPE_PRICE_ID_GLOBAL}
      - PAYPAL_CLIENT_ID=${PAYPAL_CLIENT_ID}
      - PAYPAL_CLIENT_SECRET=${PAYPAL_CLIENT_SECRET}
      - PAYPAL_WEBHOOK_ID=${PAYPAL_WEBHOOK_ID}
      - PUBLIC_URL=${PUBLIC_URL:-https://abc-io.com}
      - CORS_ORIGIN=${CORS_ORIGIN}
      - SMTP_URL=${SMTP_URL}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=${SMTP_FROM}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY}
      - GATEWAY_API_KEY=${GATEWAY_API_KEY}
      - SELF_HEAL_TOKEN=${SELF_HEAL_TOKEN}
      - REDOT1_API_KEY=${REDOT1_API_KEY}
    depends_on:
      - kimi
      - ai-isp
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'
    deploy:
      resources:
        limits:
          memory: 256M

  public-portal:
    build:
      context: ./services/public-portal
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - PUBLIC_SIGNING_KEY=${PUBLIC_SIGNING_KEY}
      - PUBLIC_SIGNING_FINGERPRINT=${PUBLIC_SIGNING_FINGERPRINT}
    ports:
      - '8090:8090'
    depends_on:
      - gateway
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8090/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'
    deploy:
      resources:
        limits:
          memory: 256M

  mobile-gateway:
    build:
      context: ./services/mobile-gateway
    environment:
      - NODE_ENV=production
      - MOBILE_SIGNING_KEY=${MOBILE_SIGNING_KEY}
      - MOBILE_SIGNING_FINGERPRINT=${MOBILE_SIGNING_FINGERPRINT}
      - PRIMARY_HOST=${PRIMARY_HOST:-162.254.32.142}
      - AI1_HOST=${AI1_HOST:-192.227.212.235}
      - AI2_HOST=${AI2_HOST:-192.227.212.237}
      - REDIS_URL=${REDIS_URL}
      - OWNER_SESSION_TOKEN=${OWNER_SESSION_TOKEN}
    ports:
      - '5050:5050'
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5050/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'
    deploy:
      resources:
        limits:
          memory: 256M

  beacon-pwa:
    build:
      context: ./services/beacon-pwa
    ports:
      - '3005:3000'
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'
    environment:
      - NODE_ENV=production
    deploy:
      resources:
        limits:
          memory: 256M

  account-pwa:
    build:
      context: ./services/account-pwa
    ports:
      - '8100:3000'
    environment:
      - NODE_ENV=production
      - GATEWAY_URL=http://gateway:4000
    depends_on:
      - gateway
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'
    deploy:
      resources:
        limits:
          memory: 256M

  kimi:
    build:
      context: ./services/kimi
    ports:
      - '5000:5000'
    environment:
      - AI_PROVIDER=${AI_PROVIDER:-mistral}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY}
      - MISTRAL_MODEL=${MISTRAL_MODEL}
      - MISTRAL_API_BASE_URL=${MISTRAL_API_BASE_URL}
      - KIMI_API_KEY=${KIMI_API_KEY}
      - KIMI_MODEL=${KIMI_MODEL}
      - KIMI_API_BASE_URL=${KIMI_API_BASE_URL}
    healthcheck:
      test: "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/health')\""
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'
    deploy:
      resources:
        limits:
          memory: 512M

  ai-isp:
    build:
      context: ./services/ai-isp
    ports:
      - '7000:7000'
    environment:
      - PORT=7000
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:7000/health')\""
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'
    deploy:
      resources:
        limits:
          memory: 512M

  beacon:
    build:
      context: ./services/beacon
    ports:
      - '3006:3000'
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - SMTP_URL=${SMTP_URL}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=${SMTP_FROM}
      - OWNER_ACCOUNT_EMAIL=${OWNER_ACCOUNT_EMAIL}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'
    deploy:
      resources:
        limits:
          memory: 256M

  worker:
    build:
      context: ./services/worker
    environment:
      - REDIS_URL=${REDIS_URL}
      - KIMI_ENDPOINTS=${KIMI_ENDPOINTS:-http://kimi:5000,http://192.227.212.235:5000,http://192.227.212.237:5000}
    restart: unless-stopped
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'
    deploy:
      resources:
        limits:
          memory: 512M
