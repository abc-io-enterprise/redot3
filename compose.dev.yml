services:
  gateway:
    build:
      context: ./services/gateway
    volumes:
      - ./services/gateway/src:/app/src
    environment:
      - NODE_ENV=development
      - PORT=4000
    ports:
      - '4000:4000'

  operator-station:
    build:
      context: ./services/operator-station
    volumes:
      - ./services/operator-station/src:/app/src
    environment:
      - NODE_ENV=development
    ports:
      - '8080:8080'

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: abc_io
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./services/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

volumes:
  postgres-data:
